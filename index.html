<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sneh Mehta</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --ink:#1a1a18;
  --muted:#5a5a56;
  --hint:#9a9a94;
  --border:rgba(30,30,20,.22);
  --surface:#f5f4ef;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px;
  background:#fff;
  color:var(--ink);
  font-family:'DM Sans',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}
main{
  width:min(760px,100%);
  border:1.5px solid var(--ink);
  border-radius:14px;
  overflow:hidden;
  background:#fff;
}
.header{
  padding:34px 30px 16px;
  border-bottom:0.5px solid var(--border);
}
.kicker{
  font-family:'DM Mono',monospace;
  font-size:11px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--hint);
  margin-bottom:8px;
}
h1{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:52px;
  line-height:1;
  font-weight:400;
  letter-spacing:-.02em;
}
.content{
  padding:24px 30px 30px;
  background:var(--surface);
}
.statement{
  font-size:20px;
  line-height:1.5;
  max-width:32ch;
}
.statement strong{
  font-weight:500;
}
.actions{
  margin-top:24px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:10px 14px;
  border-radius:8px;
  text-decoration:none;
  font-family:'DM Mono',monospace;
  font-size:11px;
  letter-spacing:.06em;
  text-transform:uppercase;
  transition:transform .15s ease;
}
.btn:hover{transform:translateY(-1px)}
.btn-primary{
  background:var(--ink);
  color:#fff;
  border:1px solid var(--ink);
}
.btn-ghost{
  color:var(--ink);
  border:1px solid var(--border);
  background:#fff;
}
@media (max-width:640px){
  h1{font-size:42px}
  .statement{font-size:18px}
}
</style>
</head>
<body>
  <main>
    <section class="header">
      <p class="kicker">About</p>
      <h1>Sneh Mehta</h1>
    </section>
    <section class="content">
      <p class="statement">Engineer doing sales, i.e. <strong>building product with GTM in mind</strong>.</p>
    </section>
  </main>
</body>
</html>
